version: "3.8"

services:
  wg2vless:
    image: spinogrizz/wg2vless:latest
    container_name: wg2vless
    restart: unless-stopped

    ports:
      - "51820:51820/udp"

    environment:
      # ---- WireGuard side ----
      WG_PORT: "51820"
      WG_ENDPOINT: "10.42.20.2"
      WG_SERVER_IP: "10.66.66.1"
      WG_CLIENT_IP: "10.66.66.2"
      WG_SUBNET_CIDR: "10.66.66.0/24"
      WG_MTU: "1420"
      WG_DNS: "1.1.1.1,8.8.8.8"
      WG_ALLOWED_IPS: "0.0.0.0/0,::/0"

      # ---- VLESS side: use either VLESS_URL or split vars ----
      #VLESS_URL: "vless://11111111-2222-3333-4444-555555555555@1.2.3.4:443?type=tcp&security=reality&pbk=abcdefghijklmnopqrstuvwxyz0123456789&fp=chrome&sni=yahoo.com&sid=cee8f80a&spx=%2F&flow=xtls-rprx-vision#client"

      VLESS_HOST: "1.2.3.4"
      VLESS_PORT: "443"
      VLESS_UUID: "11111111-2222-3333-4444-555555555555"
      VLESS_SECURITY: "reality"
      VLESS_SNI: "yahoo.com"
      VLESS_PBK: "abcdefghijklmnopqrstuvwxyz0123456789"
      VLESS_SID: "cee8f80a"
      VLESS_FP: "chrome"
      VLESS_FLOW: "xtls-rprx-vision"
      VLESS_TRANSPORT: "tcp"

      XRAY_LOGLEVEL: "warning"
      DATA_DIR: "/data"

    volumes:
      - ./data:/data:Z